<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audio Lessons | Crypto Simplified</title>
  <link rel="stylesheet" href="style.css">
  
  <style>
    .audio-container {
      max-width: 800px;
      margin: 40px auto;
      padding: 20px;
    }
    .audio-card {
      background: white;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 25px;
      margin-bottom: 20px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    }
    .lesson-header {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 15px;
    }
    .lesson-number {
      background: #0066cc;
      color: white;
      width: 45px;
      height: 45px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 1.2rem;
    }
    .lesson-title {
      font-size: 1.35rem;
      font-weight: 600;
      color: #222;
    }
    audio {
      width: 100%;
      margin-top: 10px;
    }
    .back-link {
      color: #0066cc;
      text-decoration: none;
      font-size: 1.1rem;
      margin-bottom: 30px;
      display: inline-block;
    }
  </style>
</head>
<body>

  <div class="audio-container">
    <a href="index.html" class="back-link">← Back to Home</a>

    <h1 style="text-align:center; font-size:2.2rem; margin-bottom:10px;">Audio Lessons</h1>
    <p style="text-align:center; color:#666; margin-bottom:40px;">Listen to the lessons anytime • Pure Education</p>

    <!-- Lesson 1 -->
    <div class="audio-card">
      <div class="lesson-header">
        <div class="lesson-number">1</div>
        <div class="lesson-title">What Crypto Currency really is? (Beyond The Hype)</div>
      </div>
      <audio controls controlsList="nodownload">
        <source src="https://raw.githubusercontent.com/shauryaanjney-design/Crypto_Simplified/main/audio/Audio%20Lesson-1.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
      </audio>
    </div>

    <!-- Lesson 2 -->
    <div class="audio-card">
      <div class="lesson-header">
        <div class="lesson-number">2</div>
        <div class="lesson-title">How Blockchain works?</div>
      </div>
      <audio controls controlsList="nodownload">
        <source src="https://raw.githubusercontent.com/shauryaanjney-design/Crypto_Simplified/main/audio/Audio%20Lesson-2.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
      </audio>
    </div>

    <!-- Lesson 3 -->
    <div class="audio-card">
      <div class="lesson-header">
        <div class="lesson-number">3</div>
        <div class="lesson-title">Bitcoin - The First Crypto Currency</div>
      </div>
      <audio controls controlsList="nodownload">
        <source src="https://raw.githubusercontent.com/shauryaanjney-design/Crypto_Simplified/main/audio/Audio%20Lesson-3.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
      </audio>
    </div>

    <!-- Lesson 4 -->
    <div class="audio-card">
      <div class="lesson-header">
        <div class="lesson-number">4</div>
        <div class="lesson-title">Ethereum (More than Money)</div>
      </div>
      <audio controls controlsList="nodownload">
        <source src="https://raw.githubusercontent.com/shauryaanjney-design/Crypto_Simplified/main/audio/Audio%20Lesson-4.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
      </audio>
    </div>

    <!-- Lesson 5 -->
    <div class="audio-card">
      <div class="lesson-header">
        <div class="lesson-number">5</div>
        <div class="lesson-title">How Crypto transactions work?</div>
      </div>
      <audio controls controlsList="nodownload">
        <source src="https://raw.githubusercontent.com/shauryaanjney-design/Crypto_Simplified/main/audio/Audio%20Lesson-5.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
      </audio>
    </div>

  </div>

</body>
</html>
